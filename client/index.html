<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico" />

    <!-- Viewport -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />

    <!-- Primary SEO -->
    <title>Fishoria – Online Fishing Simulator</title>
    <meta
      name="description"
      content="Fishoria is an online fishing simulator. Catch fish, explore reservoirs and upgrade your equipment directly in your browser."
    />
    <meta
      name="keywords"
      content="fishoria, fishing simulator, fishing game, fishing online, browser game, online fishing simulator, fishing simulator online, play fishing game"
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Atmosphoria Software" />
    <meta name="apple-mobile-web-app-title" content="Fishoria Simulator" />
    <meta name="theme-color" content="#0d1b2a" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Fishoria" />
    <meta
      property="og:title"
      content="Fishoria – Online Fishing Simulator"
    />
    <meta
      property="og:description"
      content="Fishoria is an online fishing simulator. Catch fish, explore reservoirs and upgrade your equipment directly in your browser."
    />
    <meta
      property="og:image"
      content="https://www.fishoria.online/images/game_banner.webp"
    />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="uk_UA" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fishoria – Online Fishing Simulator" />
    <meta
      name="twitter:description"
      content="Fishoria is an online fishing simulator. Catch fish, explore reservoirs and upgrade your equipment directly in your browser."
    />
    <meta
      name="twitter:image"
      content="https://www.fishoria.online/images/game_banner.webp"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Fishoria Fishing Simulator",
        "operatingSystem": "Web Browser",
        "applicationCategory": "GameApplication",
        "genre": "Fishing Simulator",
        "offers": {
          "@type": "Offer",

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",

        "name": "Fishoria Fishing Simulator",
