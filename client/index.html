<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico" />

    <!-- Viewport -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />

    <!-- Primary SEO -->
    <title>Fishoria - a fishing simulator</title>
    <meta
      name="description"
      content="Fishoria is a browser-based classic fishing simulator. Cast your line, catch rare fish and upgrade your gear!"
    />
    <meta
      name="keywords"
      content="fishing game, fishing simulator, online fishing, browser game, fish, angler, Fishoria, рибалка, рибак, рибалка онлайн, рибалка симулятор, рибалка гра, рибалка в інтернеті, рыбалка, рыбалка онлайн, рибалка игра"
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Atmosphoria Software" />
    <meta name="theme-color" content="#0d1b2a" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Fishoria" />
    <meta property="og:title" content="Fishoria - a fishing simulator" />
    <meta
      property="og:description"
      content="Fishoria is a browser-based classic fishing simulator. Cast your line, catch rare fish and upgrade your gear!"
    />
    <meta property="og:image" content="/images/game_banner.jpg" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fishoria - a fishing simulator" />
    <meta
      name="twitter:description"
      content="Fishoria is a browser-based classic fishing simulator. Cast your line, catch rare fish and upgrade your gear!"
    />
    <meta name="twitter:image" content="/images/game_banner.jpg" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Fishoria",
        "operatingSystem": "Web Browser",
        "applicationCategory": "GameApplication",
        "genre": "Fishing Simulator",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "description": "Fishoria is a browser-based classic fishing simulator. Cast your line, catch rare fish and upgrade your gear!"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="portal-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
